setting:
  seed: 20000812
  os_environ:
    WANDB_API_KEY: ~
    WANDB_RUN_ID: ~
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    MASTER_ADDR: localhost
    MASTER_PORT: 11225  # 12315 mark
    WORLD_SIZE: 1
    NODE_RANK: 0
  wandb_config:
    project: Stability
    name: esm2_t33_650M_UR50D

model:
#    Which model to use
  model_py_path: saprot/saprot_regression_model
  kwargs:
#    Arguments to initialize the specific class
    config_path: /data1/zhen/RA/LLMs/weights/esm2_t33_650M_UR50D  # mark
    load_pretrained: True

#    Arguments to initialize the basic class AbstractModel
  lr_scheduler_kwargs:
    last_epoch: -1
    init_lr: 2.0e-5
#    Weather to use this scheduler or not
    on_use: false

  optimizer_kwargs:
    betas: [0.9, 0.98]
    weight_decay: 0.01

  save_path: weights/Stability/random/esm2/seed25/percent5-moe3-valid_loss/esm2_t33_650M_UR50D.pt
  from_checkpoint: /data1/zhen/RA/Projects/Meta-MOE/2_Property/4_MetaDistill/weights/Stability/random/esm2/seed25/percent5-moe3-valid_loss/esm2_t33_650M_UR50D.pt  # (4_MetaDistill) student model mark


dataset:
#    Arguments to initialize the basic class LMDBDataset
  dataset_py_path: saprot/saprot_regression_dataset
  dataloader_kwargs:
    batch_size: 32  # mark
    num_workers: 8

  train_lmdb: /data1/zhen/RA/Projects/Meta-MOE/1_Data/LMDB/stability/random/seed25/percent5/train
  valid_lmdb: /data1/zhen/RA/Projects/Meta-MOE/1_Data/LMDB/stability/random/seed25/percent5/valid
  test_lmdb: /data1/zhen/RA/Projects/Meta-MOE/1_Data/LMDB/stability/random/seed25/percent5/test
#    Arguments to initialize the specific class
  kwargs:
    tokenizer: /data1/zhen/RA/LLMs/weights/esm2_t33_650M_UR50D  # mark


#  Arguments to initialize Pytorch Lightning Trainer
Trainer:
  max_epochs: 50  # origin: 50 mark
  log_every_n_steps: 1
  strategy:
    find_unused_parameters: True
  logger: False
  enable_checkpointing: false
  check_val_every_n_epoch: 1
  # val_check_interval: 0.5
  accelerator: gpu
  devices: 1  # mark
  num_nodes: 1
  accumulate_grad_batches: 1
  precision: 16
  num_sanity_val_steps: 0


